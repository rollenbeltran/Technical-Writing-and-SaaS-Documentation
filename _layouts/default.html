<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ site.title }}</title>
    <link rel="stylesheet" href="https://raw.githubusercontent.com/pages-themes/architect/master/assets/css/style.scss">
    <style>
      .page-header {
        background-color: #159957;
        background-image: linear-gradient(120deg, #155799, #159957);
        color: #fff;
        padding: 2rem 4rem;
      }
      .project-name { font-size: 3rem; margin: 0; }
      .project-tagline { font-size: 1.2rem; opacity: 0.8; }
      .btn {
        display: inline-block;
        margin-top: 1rem;
        padding: .75rem 1rem;
        color: rgba(255,255,255,.7);
        background-color: rgba(255,255,255,.08);
        border: 1px solid rgba(255,255,255,.2);
        border-radius: .3rem;
        text-decoration: none;
      }
      .main-content {
        max-width: 64rem;
        margin: 0 auto;
        padding: 2rem 4rem;
        font-size: 1.1rem;
        color: #606c71;
      }
      .site-footer {
        padding-top: 2rem;
        margin-top: 2rem;
        border-top: 1px solid #eff0f1;
        font-size: .9rem;
        color: #819198;
      }
    </style>
  </head>
  <body>
    <section class="page-header">
      <h1 class="project-name">{{ site.title }}</h1>
      <h2 class="project-tagline">{{ site.description }}</h2>
      <a href="{{ site.github.repository_url }}" class="btn">View on GitHub</a>
    </section>
    <section class="main-content">
      {{ content }}
      <footer class="site-footer">
        <span>This page was generated by <a href="https://pages.github.com">GitHub Pages</a>.</span>
      </footer>
    </section>
  </body>
</html>
